<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Jeremy Miner — Análise estruturada (Instagram + YouTube + NEPQ Funnel)</title>
<meta name="description" content="Jeremy Miner / 7th Level — cataloga conteúdo por etapa do funil, mecanismo de captura, papel e copy. Inclui Firecrawl Links do funil NEPQ.">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #131927;
    --surface-2: #0f1422;
    --border: #1e2638;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --dim: #64748b;
    --accent: #38bdf8;
    --pink: #ec4899;
    --red: #ef4444;
    --orange: #f97316;
    --green: #22c55e;
    --purple: #a855f7;
    --yellow: #eab308;
    --manychat: #a855f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header {
    padding: 32px 40px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(11, 15, 26, 0.95);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  h1 { margin: 0 0 8px; font-size: 24px; }
  .subtitle { color: var(--muted); margin: 0 0 16px; }

  .summary { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 16px;
    border-radius: 8px;
    min-width: 120px;
  }
  .stat .n { font-size: 24px; font-weight: 700; }
  .stat .l { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat.tofu .n { color: var(--accent); }
  .stat.mofu .n { color: var(--orange); }
  .stat.bofu .n { color: var(--red); }
  .stat.manychat .n { color: var(--manychat); }

  .platform-toggle {
    display: flex; gap: 0; margin: 0 0 14px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px; width: fit-content; flex-wrap: wrap;
  }
  .platform-btn {
    background: transparent; border: none; color: var(--muted);
    padding: 10px 22px; font-size: 14px; font-weight: 600;
    cursor: pointer; border-radius: 7px; transition: all 0.18s ease;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .platform-btn:hover { color: var(--text); }
  .platform-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
  .platform-btn[data-platform="ig"].active { color: var(--pink); }
  .platform-btn[data-platform="yt"].active { color: var(--red); }
  .platform-btn[data-platform="similarweb"].active { color: var(--accent); }
  .platform-btn[data-platform="ads"].active { color: var(--orange); }
  .platform-btn[data-platform="conclusao"].active { color: var(--green); }
  .platform-btn[data-platform="email"].active { color: var(--yellow); }
  .platform-btn[data-platform="miro"].active { color: var(--purple); }
  .platform-btn[data-platform="firecrawl"].active { color: var(--accent); }
  .platform-btn .pcount {
    font-size: 11px; background: var(--border); padding: 2px 7px;
    border-radius: 10px; color: var(--muted); font-weight: 700;
  }
  .platform-btn.active .pcount { background: rgba(255,255,255,0.08); color: inherit; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .filter-btn:hover { border-color: var(--muted); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }
  .export-btn {
    background: var(--accent);
    border: none;
    color: #0b0f1a;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin-left: auto;
    font-family: inherit;
  }
  .export-btn:hover { filter: brightness(1.1); }

  main {
    padding: 24px 40px 48px;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }
  section[data-platform] { display: flex; flex-direction: column; gap: 16px; }
  section[data-platform].hidden-by-platform { display: none; }
  section[data-platform].hidden-by-stage-filter { display: none; }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 8px;
    flex-wrap: wrap;
  }
  .section-head[data-platform-color="ig"]       { border-left-color: var(--pink); }
  .section-head[data-platform-color="yt"]       { border-left-color: var(--red); }
  .section-head[data-platform-color="similarweb"] { border-left-color: var(--accent); }
  .section-head[data-platform-color="ads"]      { border-left-color: var(--orange); }
  .section-head[data-platform-color="conclusao"]{ border-left-color: var(--green); }
  .section-head[data-platform-color="email"]    { border-left-color: var(--yellow); }
  .section-head[data-platform-color="miro"]     { border-left-color: var(--purple); }
  .section-head[data-platform-color="firecrawl"]{ border-left-color: var(--accent); background: linear-gradient(135deg, rgba(56,189,248,0.10), rgba(168,85,247,0.05)); }
  .section-head h2 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 1px;
    font-weight: 800;
  }
  .section-sub { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .section-stats {
    display: flex; gap: 18px;
    font-size: 13px; color: var(--muted);
  }
  .section-stats strong { color: var(--text); font-size: 15px; }
  .section-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .section-actions a {
    background: rgba(56, 189, 248, 0.08);
    border: 1px solid rgba(56, 189, 248, 0.3);
    color: var(--accent);
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 600;
    text-decoration: none;
  }
  .section-actions a:hover { background: rgba(56, 189, 248, 0.18); border-color: var(--accent); text-decoration: none; }

  .section-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 20px;
  }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 56px 40px;
    text-align: center;
  }
  .empty-state .emoji { font-size: 48px; opacity: 0.35; }
  .empty-state h3 { margin: 16px 0 8px; font-size: 18px; color: var(--text); }
  .empty-state p { color: var(--muted); margin: 0 auto; max-width: 500px; font-size: 13.5px; line-height: 1.6; }
  .empty-state code { background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px; font-size: 12.5px; color: var(--text); }

  /* Firecrawl card */
  .fc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s ease;
  }
  .fc-card:hover { border-color: var(--accent); }
  .fc-card .thumb {
    display: block; width: 100%; aspect-ratio: 16 / 10;
    overflow: hidden; background: #0a0a0a; cursor: zoom-in;
  }
  .fc-card .thumb img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
  .fc-card .body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .fc-card .title { margin: 0; font-size: 14.5px; font-weight: 700; line-height: 1.35; color: #f1f5f9; }
  .fc-card .url { font-size: 11.5px; word-break: break-all; }
  .fc-card .url a { color: var(--muted); }
  .fc-card .url a:hover { color: var(--accent); }
  .fc-card .traffic-box {
    background: rgba(56,189,248,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 9px 12px;
    margin-top: auto;
  }
  .fc-card .traffic-box .label {
    color: var(--accent); font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px;
  }
  .fc-card .traffic-box p { margin: 0; font-size: 12.5px; line-height: 1.5; color: var(--text); }
  .fc-card .links { display: flex; gap: 6px; flex-wrap: wrap; }
  .fc-card .links a {
    font-size: 11.5px; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); color: var(--muted);
    padding: 5px 10px; border-radius: 5px; font-weight: 600;
  }
  .fc-card .links a:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }

  /* IG + YT sections: padrão razzetti (cards grandes, 420px minmax) */
  section[data-platform="ig"] .section-grid,
  section[data-platform="yt"] .section-grid {
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 20px;
  }

  /* YT card: thumb 16:9 horizontal full-width (override .ig-card-top grid) */
  .ig-card.yt-card .ig-card-top {
    grid-template-columns: 1fr;
    gap: 0;
    padding: 0;
  }
  .ig-card.yt-card .ig-thumb {
    width: 100%; height: auto;
    aspect-ratio: 16 / 9;
    border-radius: 0;
  }
  .ig-card.yt-card .ig-card-head { padding: 14px 16px 0; }
  .ig-card.yt-card:hover { border-color: var(--red); }

  /* Transcript collapse (YT) */
  .ig-card.yt-card .transcript-collapse summary {
    cursor: pointer;
    background: rgba(56,189,248,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 12px; color: var(--accent);
    font-weight: 700;
    list-style: none;
    user-select: none;
  }
  .ig-card.yt-card .transcript-collapse summary::-webkit-details-marker { display: none; }
  .ig-card.yt-card .transcript-collapse summary::before {
    content: "▶"; display: inline-block; margin-right: 6px;
    transition: transform 0.2s ease;
  }
  .ig-card.yt-card .transcript-collapse[open] summary::before { transform: rotate(90deg); }
  .ig-card.yt-card .transcript-collapse pre {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px;
    font-size: 11.5px; line-height: 1.5;
    color: var(--text);
    max-height: 320px; overflow-y: auto;
    margin: 8px 0 0;
    white-space: pre-wrap; word-break: break-word;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  .ig-card.yt-card .transcript-collapse .t-len {
    font-size: 10.5px; opacity: 0.7; font-weight: 500; margin-left: 6px;
  }

  /* Links da descrição YT */
  .ig-card.yt-card .primary-dest-row {
    font-size: 11.5px; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .ig-card.yt-card .primary-dest-badge {
    display: inline-block; background: rgba(168,85,247,0.12);
    color: var(--purple); border: 1px solid rgba(168,85,247,0.35);
    padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700;
  }
  .ig-card.yt-card .links-list { display: flex; flex-direction: column; gap: 6px; }
  .ig-card.yt-card .link-row {
    font-size: 11.5px; color: var(--muted); line-height: 1.55;
    padding: 6px 10px; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 6px;
  }
  .ig-card.yt-card .link-row a {
    color: var(--accent); font-weight: 600; text-decoration: none;
  }
  .ig-card.yt-card .link-row a:hover { text-decoration: underline; }
  .ig-card.yt-card .link-dest-label {
    display: inline-block; min-width: 130px;
    font-weight: 700; color: var(--text);
    margin-right: 4px;
  }
  .ig-card.yt-card .link-sep { color: var(--dim); margin: 0 4px; }

  /* IG card razzetti-style */
  .ig-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s ease;
  }
  .ig-card:hover { border-color: var(--pink); }
  .ig-card.hidden-by-filter { display: none; }
  .ig-card.hidden-by-stage { display: none; }

  .ig-card-top {
    display: grid; grid-template-columns: 180px 1fr;
    gap: 14px; padding: 14px;
    border-bottom: 1px solid var(--border);
  }
  .ig-card .ig-thumb {
    display: block; width: 180px; height: 180px;
    overflow: hidden; background: #0a0a0a;
    border-radius: 8px; cursor: zoom-in;
    position: relative; flex-shrink: 0;
  }
  .ig-card .ig-thumb img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .ig-card .ig-thumb-fallback {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--dim); background: var(--surface-2);
    font-size: 48px; gap: 6px;
  }
  .ig-card .ig-thumb-fallback span { font-size: 10px; letter-spacing: 0.5px; }

  .ig-card .ig-card-head {
    display: flex; flex-direction: column; gap: 8px;
    min-width: 0;
  }
  .ig-card .ig-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .ig-card .badge {
    font-size: 11px; padding: 3px 8px; border-radius: 999px;
    border: 1px solid; font-weight: 600; letter-spacing: 0.3px;
  }
  .ig-card .badge.stage.TOFU { color: var(--accent); border-color: rgba(56,189,248,0.4); background: rgba(56,189,248,0.08); }
  .ig-card .badge.stage.MOFU { color: var(--orange); border-color: rgba(249,115,22,0.4); background: rgba(249,115,22,0.08); }
  .ig-card .badge.stage.BOFU { color: var(--red); border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.08); }
  .ig-card .badge.kind { color: var(--muted); background: rgba(148,163,184,0.08); border-color: var(--border); }
  .ig-card .badge.funnel { font-weight: 500; }
  .ig-card .badge.funnel.manychat    { color: var(--manychat); border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.08); }
  .ig-card .badge.funnel.lead_magnet { color: var(--yellow);   border-color: rgba(234,179,8,0.4);  background: rgba(234,179,8,0.08); }
  .ig-card .badge.funnel.sale_cta    { color: var(--red);      border-color: rgba(239,68,68,0.4);  background: rgba(239,68,68,0.08); }
  .ig-card .badge.funnel.organic     { color: var(--green);    border-color: rgba(34,197,94,0.4);  background: rgba(34,197,94,0.08); }
  .ig-card .badge.format { color: var(--muted); background: rgba(148,163,184,0.06); border-color: var(--border); font-weight: 500; }

  .ig-card h3 { margin: 0; font-size: 15px; font-weight: 700; line-height: 1.35; color: #f1f5f9; }
  .ig-card .ig-meta {
    display: flex; gap: 12px; font-size: 11.5px;
    color: var(--muted); font-weight: 600; flex-wrap: wrap;
  }
  .ig-card .ig-meta .date { color: var(--dim); }

  .ig-card .ig-analysis {
    padding: 14px 16px 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .ig-card .ig-analysis section { display: flex; flex-direction: column; gap: 6px; }
  .ig-card .ig-analysis h4 {
    margin: 0; font-size: 12px; font-weight: 700;
    letter-spacing: 0.4px; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .ig-card .ig-analysis .edit-tag {
    font-size: 9.5px; background: rgba(56,189,248,0.12);
    color: var(--accent); padding: 1px 6px; border-radius: 4px;
    font-weight: 600; letter-spacing: 0.3px;
  }
  .ig-card .ig-analysis p {
    margin: 0; font-size: 13px; line-height: 1.55; color: var(--text);
  }
  .ig-card .ig-analysis textarea {
    width: 100%; min-height: 120px;
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px;
    padding: 10px 12px; font-size: 12.5px; line-height: 1.5;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    resize: vertical;
  }
  .ig-card .ig-analysis textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .ig-card .save-state {
    font-size: 10.5px; color: var(--dim); font-style: italic;
  }
  .ig-card .save-state.saved { color: var(--green); font-style: normal; }
  .ig-card .reset-btn {
    align-self: flex-start;
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 9px; border-radius: 4px; font-size: 10.5px;
    cursor: pointer; font-family: inherit;
  }
  .ig-card .reset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ig-card .ig-link {
    font-size: 11.5px; color: var(--accent);
    font-weight: 600; text-decoration: none;
  }
  .ig-card .ig-link:hover { text-decoration: underline; }
  .ig-card .transcript-note {
    background: rgba(148,163,184,0.05);
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--dim);
    font-size: 11.5px;
    font-style: italic;
  }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; cursor: zoom-out; padding: 20px;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 95vw; max-height: 95vh;
    object-fit: contain;
    box-shadow: 0 12px 60px rgba(0,0,0,0.8);
    border-radius: 4px;
  }

  /* SimilarWeb section — copiado do razzetti */
  .sw-divider { margin-top: 28px; }
  .sw-header {
    background: linear-gradient(135deg, rgba(56,189,248,0.14), rgba(168,85,247,0.08)) !important;
    border-left: 4px solid #38bdf8 !important;
    border-color: rgba(56,189,248,0.4) !important;
  }
  .sw-header h2 { font-size: 24px !important; }
  .sw-header .section-sub { max-width: 920px; font-size: 13.5px; line-height: 1.55; color: var(--text); opacity: 0.85; }
  .sw-header .section-sub code { background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  .sw-grid { display: flex; flex-direction: column; gap: 22px; }
  .sw-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    display: grid; grid-template-columns: 1fr; gap: 0;
    align-items: stretch;
  }
  @media (min-width: 1100px) {
    .sw-card { grid-template-columns: minmax(560px, 1fr) minmax(420px, 1fr); }
  }
  .sw-img-wrap {
    background: var(--surface-2); position: relative;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 16px;
    align-self: stretch;
  }
  .sw-img-wrap .sw-sticky {
    position: sticky; top: 80px;
    width: 100%;
    display: flex; flex-direction: column; gap: 8px;
    align-items: center;
  }
  .sw-img-wrap img {
    width: 100%; max-width: 100%;
    height: auto;
    border-radius: 6px;
    cursor: zoom-in;
    transition: box-shadow 0.15s ease;
    background: var(--bg);
  }
  .sw-img-wrap img:hover { box-shadow: 0 0 0 2px var(--accent); }
  .sw-img-hint {
    font-size: 11px; color: var(--muted); letter-spacing: 0.3px;
  }
  .sw-img-missing {
    color: var(--muted); font-size: 13px; text-align: center;
    line-height: 1.6;
    padding: 60px 20px;
  }
  .sw-img-missing code {
    background: rgba(56,189,248,0.12); color: var(--accent);
    padding: 2px 8px; border-radius: 4px; font-size: 12px;
    display: inline-block; margin-top: 6px;
  }
  .sw-body { padding: 18px 22px 20px; }
  .sw-body h4 {
    margin: 0 0 10px; font-size: 16px; font-weight: 700; color: var(--text);
    line-height: 1.3;
  }
  .sw-destaque {
    margin: 0 0 14px; padding: 10px 14px;
    background: rgba(56,189,248,0.08); border-left: 3px solid var(--accent);
    border-radius: 4px; font-size: 13.5px; line-height: 1.5; color: var(--text);
  }
  .sw-explanation p {
    margin: 0 0 10px; font-size: 13.5px; line-height: 1.65; color: var(--text);
  }
  .sw-explanation p:last-child { margin-bottom: 0; }
  .sw-explanation strong { color: var(--accent); }
  .sw-explanation code {
    background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px;
    font-size: 12.5px; color: var(--text);
  }

  \1
</head>
<body>

<header>
  <h1>Jeremy Miner — Análise estruturada (Instagram + YouTube + NEPQ Funnel)</h1>
  <p class="subtitle">Jeremy Miner / 7th Level · cataloga conteúdo por etapa do funil, mecanismo de captura, papel e copy. Anote o hook visual e exporte.</p>

g about goals doesn’t make them real.\nSaying “someday” is just another way of saying “not yet.”\n\nBut the moment you decide\n “I will do this”\n “I will become this”\n “I will make this happen”\n everything shifts.\n\nBecause the second you choose action over wishing, the dream stops being a future fantasy and starts becoming a plan.\n\nThat is the same mindset he built 7th Level with.\nIt is the same mindset top salespeople use.\nAnd it is the same mindset that turns average lives into extraordinary ones.\n\nAnyone can want success.\nAnyone can want confidence.\nAnyone can want more money, freedom, time, purpose.\n\nBut the ones who get it are the ones who follow the wanting with work.\nNot in a week. Not when it feels convenient. But now.\n\nSo whatever is on your heart right now\n a goal, a number, a life you can see in your mind\n don’t just say “I want to.”\n\nSay “I will.”\nAnd then act like it.\nThat is how dreams turn into reality.\n\nNot by wishing. By choosing.\n\n- Camryn Miner","papel":"Post de feed — sem CTA / sem oferta (storytelling, opinião). Branding/autoridade pessoal sem oferta direta.","copy_initial":"**Hook (1ª frase):** When I was growing up, every time I said “I want to do this one day,” my dad would look at me and say the same thing every time:\n\n“Don’t say I want to\n\n**Caption completa:**\nWhen I was growing up, every time I said “I want to do this one day,” my dad would look at me and say the same thing every time:\n\n“Don’t say I want to.  Say I will.”\n\nBack then I didn’t really get it. I thought it was just his way of pushing me.\nNow I understand it was one of the biggest lessons he ever gave me.\n\nWanting something doesn’t move your life forward.\nTalking about goals doesn’t make them real.\nSaying “someday” is just another way of saying “not yet.”\n\nBut the moment you decide\n “I will do this”\n “I will become this”\n “I will make this happen”\n everything shifts.\n\nBecause the second you choose action over wishing, the dream stops being a future fantasy and starts becoming a plan.\n\nThat is the same mindset he built 7th Level with.\nIt is the same mindset top salespeople use.\nAnd it is the same mindset that turns average lives into extraordinary ones.\n\nAnyone can want success.\nAnyone can want confidence.\nAnyone can want more money, freedom, time, purpose.\n\nBut the ones who get it are the ones who follow the wanting with work.\nNot in a week. Not when it feels convenient. But now.\n\nSo whatever is on your heart right now\n a goal, a number, a life you can see in your mind\n don’t just say “I want to.”\n\nSay “I will.”\nAnd then act like it.\nThat is how dreams turn into reality.\n\nNot by wishing. By choosing.\n\n- Camryn Miner\n\n**Análise:** _adicione anotações sobre estrutura, oferta, prova, CTA_","date":"2025-11-04","likes":1041,"comments":36,"views":null,"likes_fmt":"1.0k","comments_fmt":"36","views_fmt":null,"duration":null,"carousel_n":null,"manychat":false,"manychat_signals":[],"format_badge":"📷 IMAGEM","funnel_kind":"organic","funnel_label":"🌱 Orgânico"},{"shortcode":"DTrUXI7DCm0","url":"https://www.instagram.com/jeremyleeminer/p/DTrUXI7DCm0/","type":"image","bucket":"static","stage":"TOFU","reason":"sem CTA / sem oferta (storytelling, opinião)","title":"🔥 Miami energy has been NEXT LEVEL this week.","caption":"🔥 Miami energy has been NEXT LEVEL this week.\nPodcast tour isn’t just about conversations it’s about connection, breakthroughs, and the future we’re building for you with  7Q.ai\n\nFrom deep-dive interviews to unexpected moments behind the mic...\n\nConcluding the tour with @freshandfitreturns tommorrow🙌🏼 \n\nCould be trouble:)","papel":"Post de feed — sem CTA / sem oferta (storytelling, opinião). Branding/autoridade pessoal sem oferta direta.","copy_initial":"**Hook (1ª frase):** 🔥 Miami energy has been NEXT LEVEL this week\n\n**Caption completa:**\n🔥 Miami energy has been NEXT LEVEL this week.\nPodcast tour isn’t just about conversations it’s about connection <script>
let PAGES = [];
let IG_POSTS = [];
let YT_POSTS = [];
let YT_TRANSCRIPTS = {}; // shortcode -> text (lazy loaded)
let activePlatform = 'firecrawl';
let activeFilter = 'all';

function load() {
  try {
    PAGES = JSON.parse(document.getElementById('pages-data').textContent);
  } catch (e) {
    console.error('Falha lendo pages-data:', e);
  }
  try {
    IG_POSTS = JSON.parse(document.getElementById('ig-data').textContent);
  } catch (e) {
    console.error('Falha lendo ig-data:', e);
  }
  try {
    YT_POSTS = JSON.parse(document.getElementById('yt-data').textContent);
  } catch (e) {
    console.error('Falha lendo yt-data:', e);
  }
  renderFirecrawl();
  renderIG();
  renderYT();
  updateIGStats();
  updateYTStats();
}

function renderFirecrawl() {
  const grid = document.getElementById('fc-grid');
  grid.innerHTML = '';
  PAGES.forEach(p => grid.appendChild(buildFcCard(p)));
}

function renderIG() {
  const grids = {
    TOFU: document.getElementById('ig-grid-tofu'),
    MOFU: document.getElementById('ig-grid-mofu'),
    BOFU: document.getElementById('ig-grid-bofu'),
  };
  Object.values(grids).forEach(g => { if (g) g.innerHTML = ''; });

  if (!IG_POSTS.length) {
    Object.values(grids).forEach(g => {
      if (g) g.innerHTML = '<div class="empty-state"><div class="emoji">⏳</div><h3>Carregando…</h3><p>Rode <code>python build_html.py</code> pra injetar os 198 posts.</p></div>';
    });
    return;
  }

  IG_POSTS.forEach(p => {
    const grid = grids[p.stage];
    if (grid) grid.appendChild(buildIGCard(p));
  });

  // Restaura textareas do localStorage e liga listeners
  hydrateTextareas();
  applyIGFilter();
}

function buildIGCard(p) {
  const c = document.createElement('article');
  c.className = 'ig-card';
  c.dataset.stage    = p.stage;
  c.dataset.bucket   = p.bucket;
  c.dataset.manychat = p.manychat ? '1' : '0';
  c.dataset.id       = p.shortcode;

  const thumbUrl = `thumbs/${p.shortcode}.jpg`;
  const date = p.date ? p.date.split('-').reverse().join('/') : '';

  // Meta line
  const metaParts = [];
  if (p.views_fmt) metaParts.push(`<span>👁 ${p.views_fmt}</span>`);
  if (p.likes_fmt) metaParts.push(`<span>♥ ${p.likes_fmt}</span>`);
  if (p.comments_fmt) metaParts.push(`<span>💬 ${p.comments_fmt}</span>`);
  if (p.duration) metaParts.push(`<span>⏱ ${Math.round(p.duration)}s</span>`);
  if (date) metaParts.push(`<span class="date">📅 ${date}</span>`);

  const fbIcon = p.bucket === 'reel' ? '🎬' : '🖼';
  const kindLabel = p.bucket === 'reel' ? 'REEL' : (p.type === 'carousel' ? 'CARROSSEL' : (p.type === 'video' ? 'VÍDEO' : 'POST'));
  const copyKey = `jeremy::copy::${p.shortcode}`;
  const hookKey = `jeremy::hook::${p.shortcode}`;

  c.innerHTML = `
    <div class="ig-card-top">
      <a class="ig-thumb" href="${thumbUrl}" onclick="openShot(event,'${thumbUrl}')">
        <img src="${thumbUrl}" alt="${p.shortcode}" loading="lazy"
             onerror="this.parentElement.innerHTML='<div class=\\'ig-thumb-fallback\\'>${fbIcon}<span>${p.shortcode}</span></div>'">
      </a>
      <div class="ig-card-head">
        <div class="ig-badges">
          <span class="badge stage ${p.stage}">${p.stage}</span>
          <span class="badge kind">${kindLabel}</span>
          <span class="badge funnel ${p.funnel_kind}">${p.funnel_label}</span>
          <span class="badge format">${p.format_badge}</span>
        </div>
        <h3>${escapeHtml(p.title)}</h3>
        <div class="ig-meta">${metaParts.join(' · ')}</div>
        <a class="ig-link" href="${p.url}" target="_blank">Abrir no Instagram ↗</a>
      </div>
    </div>
    <div class="ig-analysis">
      <section>
        <h4>📌 Papel no perfil</h4>
        <p>${escapeHtml(p.papel)}</p>
      </section>
      <section class="copy-section">
        <h4>📝 Análise de copy <span class="edit-tag">editável · localStorage</span></h4>
        <textarea class="copy-textarea" data-storage-key="${copyKey}" data-default-encoded="${encodeURIComponent(p.copy_initial)}" rows="6">${escapeHtml(p.copy_initial)}</textarea>
        <div class="save-state" data-for="${copyKey}">não editado</div>
        <button class="reset-btn" data-reset-key="${copyKey}">↺ original</button>
      </section>
      <section>
        <h4>🎬 Análise visual / hook <span class="edit-tag">editável · localStorage</span></h4>
        <textarea class="hook-textarea" data-storage-key="${hookKey}" rows="3" placeholder="Anote o hook visual (primeiros 3s): enquadramento, expressão, texto na tela, transição..."></textarea>
        <div class="save-state" data-for="${hookKey}">não salvo</div>
      </section>
      <section>
        <div class="transcript-note">📄 Transcrição pendente — não temos áudio dos reels (IG GraphQL capou mai/26, sem download de video). Pra ter transcrição: rodar download de vídeos + Whisper.</div>
      </section>
    </div>
  `;
  return c;
}

function hydrateTextareas() {
  document.querySelectorAll('.ig-card textarea[data-storage-key]').forEach(ta => {
    const key = ta.dataset.storageKey;
    const saved = localStorage.getItem(key);
    if (saved !== null) {
      ta.value = saved;
      const stateEl = document.querySelector(`.save-state[data-for="${key}"]`);
      if (stateEl) {
        stateEl.textContent = '✓ salvo localmente';
        stateEl.classList.add('saved');
      }
    }
    ta.addEventListener('input', debounce(() => {
      localStorage.setItem(key, ta.value);
      const stateEl = document.querySelector(`.save-state[data-for="${key}"]`);
      if (stateEl) {
        stateEl.textContent = '✓ salvo localmente';
        stateEl.classList.add('saved');
      }
    }, 400));
  });
  document.querySelectorAll('.ig-card .reset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.resetKey;
      const ta  = document.querySelector(`textarea[data-storage-key="${key}"]`);
      if (!ta) return;
      const def = decodeURIComponent(ta.dataset.defaultEncoded || '');
      ta.value = def;
      localStorage.removeItem(key);
      const stateEl = document.querySelector(`.save-state[data-for="${key}"]`);
      if (stateEl) {
        stateEl.textContent = 'restaurado pro original';
        stateEl.classList.remove('saved');
      }
    });
  });
}

function debounce(fn, ms) {
  let t;
  return function(...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function applyIGFilter() {
  // applies to IG + YT cards across todas as 6 sub-sections (IG x3 + YT x3)
  const visible = { ig: {TOFU:0, MOFU:0, BOFU:0}, yt: {TOFU:0, MOFU:0, BOFU:0} };
  document.querySelectorAll('.ig-card').forEach(c => {
    const stage    = c.dataset.stage;
    const bucket   = c.dataset.bucket;
    const manychat = c.dataset.manychat === '1';
    const isYT     = c.classList.contains('yt-card');
    let show = true;
    if (activeFilter === 'TOFU' || activeFilter === 'MOFU' || activeFilter === 'BOFU') {
      show = stage === activeFilter;
    } else if (activeFilter === 'reel') {
      show = bucket === 'reel';
    } else if (activeFilter === 'feed') {
      show = bucket === 'static';
    } else if (activeFilter === 'manychat') {
      show = manychat;
    } else if (activeFilter === 'no-manychat') {
      show = !manychat && !isYT;  // YT nao tem manychat conceito
    }
    c.classList.toggle('hidden-by-filter', !show);
    if (show) {
      const k = isYT ? 'yt' : 'ig';
      visible[k][stage]++;
    }
  });

  // Esconde sub-section se 0 cards visiveis
  ['ig', 'yt'].forEach(plat => {
    ['TOFU', 'MOFU', 'BOFU'].forEach(stage => {
      const section = document.querySelector(`section[data-platform="${plat}"][data-stage="${stage}"]`);
      if (section) section.classList.toggle('hidden-by-stage-filter', visible[plat][stage] === 0);
    });
  });
}

function updateIGStats() {
  if (!IG_POSTS.length) return;
  const byStage = { TOFU: [], MOFU: [], BOFU: [] };
  IG_POSTS.forEach(p => { if (byStage[p.stage]) byStage[p.stage].push(p); });

  ['tofu', 'mofu', 'bofu'].forEach(s => {
    const stage = s.toUpperCase();
    const arr = byStage[stage];
    const el = document.getElementById(`ig-${s}-stats`);
    if (!el) return;
    const reels = arr.filter(p => p.bucket === 'reel').length;
    const feed  = arr.filter(p => p.bucket === 'static').length;
    const views = arr.reduce((sum, p) => sum + (p.views || 0), 0);
    const likes = arr.reduce((sum, p) => sum + (p.likes || 0), 0);
    const mc    = arr.filter(p => p.manychat).length;
    el.innerHTML = `
      <div><strong>${arr.length}</strong> posts (${reels}R+${feed}F)</div>
      ${views ? `<div><strong>${fmtNum(views)}</strong> views</div>` : ''}
      <div><strong>${fmtNum(likes)}</strong> likes</div>
      <div><strong>${mc}</strong> manychat</div>
    `;
  });
}

function fmtNum(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return String(n);
}

// ========= YouTube cards =========

function renderYT() {
  const grids = {
    TOFU: document.getElementById('yt-grid-tofu'),
    MOFU: document.getElementById('yt-grid-mofu'),
    BOFU: document.getElementById('yt-grid-bofu'),
  };
  Object.values(grids).forEach(g => { if (g) g.innerHTML = ''; });

  if (!YT_POSTS.length) {
    Object.values(grids).forEach(g => {
      if (g) g.innerHTML = '<div class="empty-state"><div class="emoji">📺</div><h3>Sem vídeos catalogados ainda</h3><p>Rode <code>youtube/fetch_yt_meta.py</code> → <code>pick_top_and_fetch_assets.py</code> → <code>classify_yt.py</code> → <code>build_html.py</code> pra popular.</p></div>';
    });
    return;
  }

  YT_POSTS.forEach(v => {
    const grid = grids[v.stage];
    if (grid) grid.appendChild(buildYTCard(v));
  });

  hydrateTextareas();
  bindYTTranscripts();
  applyIGFilter(); // mesma logica de filter
}

function buildYTCard(v) {
  const c = document.createElement('article');
  c.className = 'ig-card yt-card';
  c.dataset.stage    = v.stage;
  c.dataset.bucket   = 'yt';
  c.dataset.manychat = '0';
  c.dataset.id       = v.id;

  const thumbUrl = `youtube/thumbs/${v.id}.jpg`;
  const dateBR = v.date ? v.date.split('-').reverse().join('/') : '';

  const metaParts = [];
  if (v.views_fmt)    metaParts.push(`<span>👁 ${v.views_fmt}</span>`);
  if (v.likes_fmt)    metaParts.push(`<span>♥ ${v.likes_fmt}</span>`);
  if (v.comments_fmt) metaParts.push(`<span>💬 ${v.comments_fmt}</span>`);
  if (v.duration) {
    const d = v.duration;
    const lbl = d >= 3600 ? `${Math.floor(d/3600)}h${Math.floor((d%3600)/60)}m` : `${Math.floor(d/60)}m${Math.floor(d%60)}s`;
    metaParts.push(`<span>⏱ ${lbl}</span>`);
  }
  if (dateBR) metaParts.push(`<span class="date">📅 ${dateBR}</span>`);

  const copyKey = `jeremy::yt-copy::${v.id}`;
  const hookKey = `jeremy::yt-hook::${v.id}`;

  const transcriptSection = v.has_transcript
    ? `<section>
        <details class="transcript-collapse" data-vid="${v.id}">
          <summary>📄 Ver transcrição completa <span class="t-len">(${v.transcript_words} palavras)</span></summary>
          <pre class="transcript-text">carregando…</pre>
        </details>
      </section>`
    : `<section><div class="transcript-note">📄 Sem transcrição (canal sem auto-captions disponíveis pra esse vídeo)</div></section>`;

  // Links na descrição agrupados por destino
  const links = v.links || [];
  let linksSection = '';
  if (links.length) {
    const grouped = {};
    links.forEach(l => {
      const k = l.dest || 'other';
      if (!grouped[k]) grouped[k] = { label: l.label, urls: [] };
      grouped[k].urls.push(l.url);
    });
    const order = ['book_demo','lead_book','lead_vsl','authority','podcast','social','other'];
    const orderedDests = order.filter(k => grouped[k]);
    const linksList = orderedDests.map(k => {
      const g = grouped[k];
      const items = g.urls.map(u => `<a href="${escapeHtml(u)}" target="_blank" rel="noopener" title="${escapeHtml(u)}">${escapeHtml(domainShort(u))}</a>`).join('<span class="link-sep"> · </span>');
      return `<div class="link-row"><span class="link-dest-label">${g.label}</span> ${items}</div>`;
    }).join('');
    const primaryBadge = v.primary_label
      ? `<span class="primary-dest-badge" title="${escapeHtml(v.primary_label)}">${escapeHtml(v.primary_label)}</span>`
      : '';
    linksSection = `
      <section>
        <h4>🔗 Links na descrição <span class="edit-tag">${links.length} links</span></h4>
        ${primaryBadge ? `<div class="primary-dest-row">Destino primário: ${primaryBadge}</div>` : ''}
        <div class="links-list">${linksList}</div>
      </section>`;
  }

  c.innerHTML = `
    <div class="ig-card-top">
      <a class="ig-thumb" href="${thumbUrl}" onclick="openShot(event,'${thumbUrl}')">
        <img src="${thumbUrl}" alt="${v.id}" loading="lazy"
             onerror="this.parentElement.innerHTML='<div class=\\'ig-thumb-fallback\\'>🎥<span>${v.id}</span></div>'">
      </a>
      <div class="ig-card-head">
        <div class="ig-badges">
          <span class="badge stage ${v.stage}">${v.stage}</span>
          <span class="badge kind">YT VIDEO</span>
          <span class="badge funnel ${v.funnel_kind}">${v.funnel_label}</span>
          <span class="badge format">${v.format_badge}</span>
        </div>
        <h3>${escapeHtml(v.title)}</h3>
        <div class="ig-meta">${metaParts.join(' · ')}</div>
        <a class="ig-link" href="${v.url}" target="_blank">Abrir no YouTube ↗</a>
      </div>
    </div>
    <div class="ig-analysis">
      <section>
        <h4>📌 Papel no perfil</h4>
        <p>${escapeHtml(v.papel)}</p>
      </section>
      <section class="copy-section">
        <h4>📝 Análise de copy <span class="edit-tag">editável · localStorage</span></h4>
        <textarea class="copy-textarea" data-storage-key="${copyKey}" data-default-encoded="${encodeURIComponent(v.copy_initial)}" rows="6">${escapeHtml(v.copy_initial)}</textarea>
        <div class="save-state" data-for="${copyKey}">não editado</div>
        <button class="reset-btn" data-reset-key="${copyKey}">↺ original</button>
      </section>
      <section>
        <h4>🎬 Análise visual / hook <span class="edit-tag">editável · localStorage</span></h4>
        <textarea class="hook-textarea" data-storage-key="${hookKey}" rows="3" placeholder="Anote o hook do título, gancho da intro (3s), super estrutura, CTA com timestamp..."></textarea>
        <div class="save-state" data-for="${hookKey}">não salvo</div>
      </section>
      ${linksSection}
      ${transcriptSection}
    </div>
  `;
  return c;
}

function domainShort(u) {
  try {
    const url = new URL(u);
    let h = url.hostname.replace(/^www\./, '');
    let p = url.pathname;
    if (p === '/' || p === '') return h;
    // Mostra dominio + primeiro segmento do path
    const seg = p.split('/').filter(Boolean).slice(0, 2).join('/');
    return h + '/' + seg;
  } catch {
    return u.slice(0, 40);
  }
}

function bindYTTranscripts() {
  document.querySelectorAll('.transcript-collapse[data-vid]').forEach(det => {
    const vid = det.dataset.vid;
    det.addEventListener('toggle', async () => {
      if (!det.open) return;
      const pre = det.querySelector('pre.transcript-text');
      if (!pre || pre.dataset.loaded === '1') return;
      pre.textContent = 'carregando…';
      try {
        const resp = await fetch(`youtube/captions/${vid}.txt`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const txt = await resp.text();
        pre.textContent = txt;
        pre.dataset.loaded = '1';
      } catch (e) {
        pre.textContent = `(erro carregando transcrição: ${e.message})`;
      }
    }, { once: false });
  });
}

function updateYTStats() {
  if (!YT_POSTS.length) return;
  const byStage = { TOFU: [], MOFU: [], BOFU: [] };
  YT_POSTS.forEach(v => { if (byStage[v.stage]) byStage[v.stage].push(v); });

  ['tofu', 'mofu', 'bofu'].forEach(s => {
    const stage = s.toUpperCase();
    const arr = byStage[stage];
    const el = document.getElementById(`yt-${s}-stats`);
    if (!el) return;
    const views = arr.reduce((sum, v) => sum + (v.views || 0), 0);
    const likes = arr.reduce((sum, v) => sum + (v.likes || 0), 0);
    const trans = arr.filter(v => v.has_transcript).length;
    el.innerHTML = `
      <div><strong>${arr.length}</strong> vídeos</div>
      <div><strong>${fmtNum(views)}</strong> views</div>
      <div><strong>${fmtNum(likes)}</strong> likes</div>
      <div><strong>${trans}</strong> com transcrição</div>
    `;
  });

  // Atualiza platform-toggle counter
  const ytBtn = document.querySelector('.platform-btn[data-platform="yt"] .pcount');
  if (ytBtn) ytBtn.textContent = YT_POSTS.length;
}

function buildFcCard(p) {
  const c = document.createElement('article');
  c.className = 'fc-card';
  const shot = 'firecrawl-links/' + p.screenshot;
  const md   = 'firecrawl-links/' + p.md;
  c.innerHTML = `
    <a class="thumb" href="${shot}" onclick="openShot(event,'${shot}')">
      <img src="${shot}" alt="print ${p.slug}" loading="lazy">
    </a>
    <div class="body">
      <h3 class="title">${p.title}</h3>
      <div class="url"><a href="${p.url}" target="_blank">${p.url}</a></div>
      <div class="traffic-box">
        <div class="label">Tráfego dominante</div>
        <p>${p.traffic_note}</p>
      </div>
      <div class="links">
        <a href="${md}" target="_blank">Markdown</a>
        <a href="${shot}" target="_blank">Print completo</a>
        <a href="${p.url}" target="_blank">Página ao vivo ↗</a>
      </div>
    </div>
  `;
  return c;
}

function openShot(ev, href) {
  ev.preventDefault();
  document.getElementById('lightbox-img').src = href;
  document.getElementById('lightbox').classList.add('active');
}

function exportJSON() {
  const data = document.getElementById('pages-data').textContent;
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'jeremy-miner-anotacoes.json';
  a.click();
  URL.revokeObjectURL(url);
}

// Platform toggle
document.getElementById('platform-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.platform-btn');
  if (!btn) return;
  document.querySelectorAll('#platform-toggle .platform-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activePlatform = btn.dataset.platform;
  document.querySelectorAll('section[data-platform]').forEach(s => {
    s.classList.toggle('hidden-by-platform', s.dataset.platform !== activePlatform);
  });
});

// Filtros (TOFU/MOFU/BOFU/reel/feed/manychat) aplicam aos cards IG
document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyIGFilter();
  });
});

load();
