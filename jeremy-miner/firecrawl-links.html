<script>
let PAGES = [];

function load() {
  try {
    PAGES = JSON.parse(document.getElementById('pages-data').textContent);
  } catch (e) {
    document.getElementById('grid').innerHTML = '<div style="color:#94a3b8;padding:40px;text-align:center">Erro lendo dados: ' + e.message + '</div>';
    return;
  }
  render();
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  PAGES.forEach(p => grid.appendChild(buildCard(p)));
}

function buildCard(p) {
  const card = document.createElement('article');
  card.className = 'card';
  const shotHref = 'firecrawl-links/' + p.screenshot;
  const mdHref   = 'firecrawl-links/' + p.md;
  card.innerHTML = `
    <a class="thumb" href="${shotHref}" onclick="openShot(event, '${shotHref}')">
      <img src="${shotHref}" alt="print ${p.slug}" loading="lazy">
    </a>
    <div class="card-body">
      <h3 class="card-title">${p.title}</h3>
      <div class="card-url"><a href="${p.url}" target="_blank">${p.url}</a></div>
      <div class="traffic-box">
        <div class="label">Tráfego dominante</div>
        <p>${p.traffic_note}</p>
      </div>
      <div class="card-links">
        <a href="${mdHref}" target="_blank">Markdown</a>
        <a href="${shotHref}" target="_blank">Print completo</a>
        <a href="${p.url}" target="_blank">Página ao vivo ↗</a>
      </div>
    </div>
  `;
  return card;
}

function openShot(ev, href) {
  ev.preventDefault();
  document.getElementById('lightbox-img').src = href;
  document.getElementById('lightbox').classList.add('active');
}

function exportJSON() {
  const data = document.getElementById('pages-data').textContent;
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'jeremy-miner-firecrawl-links.json';
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('gen-date').textContent = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });

load();
</script>
